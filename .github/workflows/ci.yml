name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build package
        run: bun run build

      - name: Build docs
        run: bun run docs:build
        env:
          DOCS_BASE: /huno-inertia/

      - name: Smoke test package import
        run: bun --eval "import { createInertia, always, lazy, optional } from './dist/index.js'; if (typeof createInertia !== 'function' || typeof always !== 'function' || typeof lazy !== 'function' || typeof optional !== 'function') throw new Error('Invalid package exports')"

      - name: Smoke test example app
        run: bun --eval "import app from './examples/basic/src/index.ts'; const page = await (await app.request('/', { headers: { 'X-Inertia': 'true' } })).json(); if (page.component !== 'Home') throw new Error('Example app did not render Home')"

      - name: Verify publish tarball
        run: npm pack --dry-run
